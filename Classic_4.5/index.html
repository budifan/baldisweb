<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Baldi's Basics Classic</title>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" width="100%" height="100%" style="position: absolute; width: 100%; height: 100%; background: #000000; left: 0px; top: 0px; margin: 0px; margin-left: 0px; margin-top: 0px;"></canvas>
    <script src="Build/Classic_4.5.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/Classic_4.5.data.unityweb",
        frameworkUrl: "Build/Classic_4.5.framework.js.unityweb",
        codeUrl: "Build/Classic_4.5.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Baldi's Basics Classic",
        productVersion: "1.4.3",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      });
    </script>
  </body>
</html>
